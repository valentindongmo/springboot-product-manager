name: Gestion des produits

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Récupérer le code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Installer Java 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven  # cela va mettre en cache le .m2 pour accélérer

      # 3️⃣ Build Maven
      - name: Build with Maven
        run: mvn clean package -B

      # 4️⃣ Exécuter les tests
      - name: Run tests
        run: mvn test